<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // Get the token from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (token) {
            // IMPORTANT: Use the correct custom scheme
            window.location.href = `yourapp://reset-password?token=${token}`;
        } else {
            document.write('Invalid reset link');
        }
    </script>
</head>
<body>
    <p>Redirecting to app...</p>
    <p>If you're not redirected, <a href="#" id="fallback">click here</a></p>
    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        if (token) {
            document.getElementById('fallback').href = `yourapp://reset-password?token=${token}`;
        }
    </script>
</body>
</html>
